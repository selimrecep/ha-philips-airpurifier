version: 2
updates:
  # Python dependencies (uv project: pyproject.toml + uv.lock).
  # Checked daily so the Home Assistant floor tracks new stable releases quickly.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      homeassistant:
        patterns:
          - "homeassistant*"
          - "pytest-homeassistant-custom-component"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Dev container base image (mcr.microsoft.com/devcontainers/python).
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Dev container features (devcontainer.json), if any are added later.
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
